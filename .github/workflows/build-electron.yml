name: Build Electron Desktop App

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install all workspace dependencies (root)
        run: npm install --ignore-scripts 2>$null
        continue-on-error: true

      - name: Build frontend
        working-directory: packages/frontend
        run: npx vite build

      - name: Install backend dependencies (standalone for electron bundle)
        working-directory: packages/backend
        run: npm install

      - name: Build backend (TypeScript)
        working-directory: packages/backend
        run: npx tsc

      - name: Prepare backend bundle for Electron
        shell: pwsh
        run: |
          Copy-Item -Path "packages/backend/src/locales" -Destination "packages/backend/dist/locales" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "packages/backend/html-presets" -Destination "packages/backend/dist/html-presets" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "packages/backend/package.json" -Destination "packages/backend/dist/package.json" -Force
          Copy-Item -Path "packages/backend/package-lock.json" -Destination "packages/backend/dist/package-lock.json" -Force
          Push-Location "packages/backend/dist"
          npm install --omit=dev
          Pop-Location

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Build Electron app (Windows)
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --win --config

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows
          path: electron-app/dist/*.exe
          compression-level: 0

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            electron-app/dist/*.exe
            electron-app/dist/*.zip
