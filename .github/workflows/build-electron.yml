name: Build Windows Desktop App

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "0.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace dependencies
        run: npm install --ignore-scripts

      - name: Build frontend
        working-directory: packages/frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: packages/backend
        run: npm install

      - name: Build backend
        working-directory: packages/backend
        run: npm run build

      - name: Prepare backend production dependencies
        shell: pwsh
        run: |
          Copy-Item -Path "packages/backend/src/locales" -Destination "packages/backend/dist/locales" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "packages/backend/html-presets" -Destination "packages/backend/dist/html-presets" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "packages/backend/package.json" -Destination "packages/backend/dist/package.json" -Force
          Copy-Item -Path "packages/backend/package-lock.json" -Destination "packages/backend/dist/package-lock.json" -Force
          Push-Location "packages/backend/dist"
          npm install --omit=dev
          Pop-Location

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Prepare bundled Node.js runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "electron-app/nodejs-runtime/win-x64" | Out-Null
          Copy-Item -Path (Get-Command node).Source -Destination "electron-app/nodejs-runtime/win-x64/node.exe" -Force

      - name: Build Electron app
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --win --config --publish never

      - name: Create portable unpacked zip
        shell: pwsh
        run: |
          New-Item -ItemType File -Force -Path "electron-app/dist/win-unpacked/.Portable" | Out-Null
          Compress-Archive -Path "electron-app/dist/win-unpacked/*" -DestinationPath "electron-app/dist/Nexus Terminal Portable win-unpacked.zip" -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows-Installer
          path: electron-app/dist/*Setup*.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows-Portable-Exe
          path: electron-app/dist/*Portable*.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload portable unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows-Portable-Unpacked
          path: electron-app/dist/*Portable win-unpacked.zip
          if-no-files-found: error
          compression-level: 0

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            electron-app/dist/*Setup*.exe
            electron-app/dist/*Portable*.exe
            electron-app/dist/*Portable win-unpacked.zip
