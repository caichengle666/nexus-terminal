name: Build Electron Desktop App

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 前端：先确保 node_modules，然后构建
      - name: Build frontend
        working-directory: packages/frontend
        run: |
          npm install
          npx vite build

      # 后端：清除根目录 workspace 影响，就地安装依赖并编译
      - name: Build backend
        working-directory: packages/backend
        run: |
          npm install
          npx tsc
          xcopy /E /I /Y "src\locales" "dist\locales" 2>nul || copy "src\locales" "dist\locales"

      - name: Prepare backend bundle for Electron
        shell: pwsh
        run: |
          Copy-Item -Path "packages/backend/node_modules" -Destination "packages/backend/dist/node_modules" -Recurse -Force
          Copy-Item -Path "packages/backend/html-presets" -Destination "packages/backend/dist/html-presets" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Build Electron app (Windows)
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --win --config

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows
          path: electron-app/dist/*.exe
          compression-level: 0

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            electron-app/dist/*.exe
            electron-app/dist/*.zip
