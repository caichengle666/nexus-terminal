name: Build Desktop App

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "0.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace dependencies
        run: npm install --ignore-scripts

      - name: Build frontend
        working-directory: packages/frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: packages/backend
        run: npm install

      - name: Build backend
        working-directory: packages/backend
        run: npm run build

      - name: Prepare backend production dependencies
        shell: pwsh
        run: |
          Copy-Item -Path "packages/backend/src/locales" -Destination "packages/backend/dist/locales" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "packages/backend/html-presets" -Destination "packages/backend/dist/html-presets" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "packages/backend/package.json" -Destination "packages/backend/dist/package.json" -Force
          Copy-Item -Path "packages/backend/package-lock.json" -Destination "packages/backend/dist/package-lock.json" -Force
          Push-Location "packages/backend/dist"
          npm install --omit=dev
          Pop-Location

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Prepare bundled Node.js runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "electron-app/nodejs-runtime/win-x64" | Out-Null
          Copy-Item -Path (Get-Command node).Source -Destination "electron-app/nodejs-runtime/win-x64/node.exe" -Force

      - name: Build Electron app
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --win --config --publish never

      - name: Create portable unpacked zip
        shell: pwsh
        run: |
          New-Item -ItemType File -Force -Path "electron-app/dist/win-unpacked/.Portable" | Out-Null
          Compress-Archive -Path "electron-app/dist/win-unpacked/*" -DestinationPath "electron-app/dist/Nexus Terminal Portable win-unpacked.zip" -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows-Installer
          path: electron-app/dist/*Setup*.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows-Portable-Exe
          path: electron-app/dist/*Portable*.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload portable unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows-Portable-Unpacked
          path: electron-app/dist/*Portable win-unpacked.zip
          if-no-files-found: error
          compression-level: 0

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            electron-app/dist/*Setup*.exe
            electron-app/dist/*Portable*.exe
            electron-app/dist/*Portable win-unpacked.zip


  build-macos-x64:
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace dependencies
        run: npm install --ignore-scripts

      - name: Build frontend
        working-directory: packages/frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: packages/backend
        run: npm install

      - name: Build backend
        working-directory: packages/backend
        run: npm run build

      - name: Prepare backend production dependencies
        shell: bash
        run: |
          cp -r packages/backend/src/locales packages/backend/dist/locales 2>/dev/null || true
          cp -r packages/backend/html-presets packages/backend/dist/html-presets 2>/dev/null || true
          cp packages/backend/package.json packages/backend/dist/package.json
          cp packages/backend/package-lock.json packages/backend/dist/package-lock.json 2>/dev/null || true
          cd packages/backend/dist && npm install --omit=dev

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Prepare bundled Node.js runtime (x64)
        shell: bash
        run: |
          mkdir -p electron-app/nodejs-runtime/darwin-x64
          cp $(which node) electron-app/nodejs-runtime/darwin-x64/node
          chmod +x electron-app/nodejs-runtime/darwin-x64/node

      - name: Build Electron app (macOS x64)
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --mac --x64 --config --publish never

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-macOS-x64
          path: electron-app/dist/*.dmg
          if-no-files-found: error
          compression-level: 0

  build-macos-arm64:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace dependencies
        run: npm install --ignore-scripts

      - name: Build frontend
        working-directory: packages/frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: packages/backend
        run: npm install

      - name: Build backend
        working-directory: packages/backend
        run: npm run build

      - name: Prepare backend production dependencies
        shell: bash
        run: |
          cp -r packages/backend/src/locales packages/backend/dist/locales 2>/dev/null || true
          cp -r packages/backend/html-presets packages/backend/dist/html-presets 2>/dev/null || true
          cp packages/backend/package.json packages/backend/dist/package.json
          cp packages/backend/package-lock.json packages/backend/dist/package-lock.json 2>/dev/null || true
          cd packages/backend/dist && npm install --omit=dev

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Prepare bundled Node.js runtime (arm64)
        shell: bash
        run: |
          mkdir -p electron-app/nodejs-runtime/darwin-arm64
          cp $(which node) electron-app/nodejs-runtime/darwin-arm64/node
          chmod +x electron-app/nodejs-runtime/darwin-arm64/node

      - name: Build Electron app (macOS arm64)
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --mac --arm64 --config --publish never

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-macOS-arm64
          path: electron-app/dist/*.dmg
          if-no-files-found: error
          compression-level: 0

  release:
    if: startsWith(github.ref, '''refs/tags/''')
    needs: [build-windows, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Nexus-Terminal-Windows-Installer/*.exe
            Nexus-Terminal-Windows-Portable-Exe/*.exe
            Nexus-Terminal-Windows-Portable-Unpacked/*.zip
            Nexus-Terminal-macOS-x64/*.dmg
            Nexus-Terminal-macOS-arm64/*.dmg
