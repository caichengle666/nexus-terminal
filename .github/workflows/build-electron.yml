name: Build Electron Desktop App

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies & build
        working-directory: packages/frontend
        run: |
          npm ci
          npx vite build

      - name: Install backend dependencies (standalone)
        working-directory: packages/backend
        run: |
          # Remove workspace reference to install deps locally
          npm ci --install-strategy=nested

      - name: Build backend (TypeScript)
        working-directory: packages/backend
        run: npx tsc

      - name: Prepare backend bundle for Electron
        shell: pwsh
        run: |
          Copy-Item -Path "packages/backend/src/locales" -Destination "packages/backend/dist/locales" -Recurse -Force
          Copy-Item -Path "packages/backend/node_modules" -Destination "packages/backend/dist/node_modules" -Recurse -Force
          Copy-Item -Path "packages/backend/html-presets" -Destination "packages/backend/dist/html-presets" -Recurse -Force

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build Electron app (Windows)
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder build --win --config

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Terminal-Windows
          path: electron-app/dist/*.exe
          compression-level: 0

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            electron-app/dist/*.exe
            electron-app/dist/*.zip
