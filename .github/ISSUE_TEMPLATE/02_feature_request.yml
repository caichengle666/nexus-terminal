name: ✨ 功能建议
description: 提出新功能或改进想法
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽可能详细描述。
  - type: textarea
    id: problem
    attributes:
      label: 解决了什么问题
      description: 这个功能解决了什么痛点或提供了什么新能力？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案
      description: 描述你理想中的功能是什么样的
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你还考虑过其他方案吗？
